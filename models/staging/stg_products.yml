version: 2

models:
  - name: stg_products
    description: Cleaned product catalog. One row per baked good sold by the bakery.
    columns:
      - name: product_id
        description: Primary key. Unique identifier for each product (e.g. PRD-001).
        tests:
          - unique
          - not_null
      - name: product_name
        description: Name of the baked good.
        tests:
          - not_null
      - name: category
        description: >
          Product category grouping. Valid values: Breads, Pastries, Muffins,
          Cakes, Cookies, Brownies, Seasonal (used for limited-run items).
        tests:
          - accepted_values:
              arguments:
                values: ['Breads', 'Pastries', 'Muffins', 'Cakes', 'Cookies', 'Brownies', 'Seasonal']
      - name: unit_price
        description: Retail price per unit in USD charged to customers at point of sale.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: is_active
        description: >
          Whether the product is currently being baked and sold. Inactive products
          (is_active = false) may be seasonal items or discontinued lines.
        tests:
          - not_null
